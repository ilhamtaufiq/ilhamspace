# Named volume = data survives container rebuilds (bind ./data sering tidak
# terpasang / ditimpa Coolify). Hapus SEMUA Persistent Storage di dashboard.
services:
  app:
    build:
      context: .
      args:
        - COOLIFY_URL=${COOLIFY_URL:-}
        - COOLIFY_FQDN=${COOLIFY_FQDN:-}
    expose:
      - 3000
    volumes:
      - ilhamspace-data:/app/persist
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - ORIGIN=${ORIGIN:-https://is.cianjur.space}
      - SESSION_SECRET=${SESSION_SECRET:?Set SESSION_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - BODY_SIZE_LIMIT=${BODY_SIZE_LIMIT:-15M}
    labels:
      - "coolify.port=3000"
    networks:
      - coolify
    restart: always

volumes:
  ilhamspace-data:
    name: ilhamspace-diwpciiw0oaieuvly0q8yb1d

networks:
  coolify:
    external: true