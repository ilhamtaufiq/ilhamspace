# Host ./data sama seperti spm-am. Container pakai /app/persist (bukan /app/data)
# supaya tidak bentrok dengan Coolify Persistent Storage yang sering di-mount ke
# /app/data atau /persist dan mengosongkan DB tiap redeploy.
services:
  app:
    build:
      context: .
      args:
        - COOLIFY_URL=${COOLIFY_URL:-}
        - COOLIFY_FQDN=${COOLIFY_FQDN:-}
    expose:
      - 3000
    volumes:
      - ./data:/app/persist
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - ORIGIN=${ORIGIN:-https://is.cianjur.space}
      - DATABASE_PATH=/app/persist/ilhamspace.db
      - SESSION_SECRET=${SESSION_SECRET:?Set SESSION_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - BODY_SIZE_LIMIT=${BODY_SIZE_LIMIT:-15M}
    labels:
      - "coolify.port=3000"
    networks:
      - coolify
    restart: always

networks:
  coolify:
    external: true