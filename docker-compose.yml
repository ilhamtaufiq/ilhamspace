# Bind ke folder persisten Coolify (sama seperti spm-am ./data, tapi path eksplisit).
# Hapus semua "Persistent Storage" di Coolify UI — itu bikin volume hash baru tiap deploy.
services:
  app:
    build:
      context: .
      args:
        - COOLIFY_URL=${COOLIFY_URL:-}
        - COOLIFY_FQDN=${COOLIFY_FQDN:-}
    expose:
      - 3000
    volumes:
      - type: bind
        source: /data/coolify/applications/${COOLIFY_RESOURCE_UUID}/data
        target: /app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - ORIGIN=${ORIGIN:-https://is.cianjur.space}
      - DATABASE_PATH=/app/data/ilhamspace.db
      - SESSION_SECRET=${SESSION_SECRET:?Set SESSION_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - BODY_SIZE_LIMIT=${BODY_SIZE_LIMIT:-15M}
    labels:
      - "coolify.port=3000"
    networks:
      - coolify
    restart: always

networks:
  coolify:
    external: true