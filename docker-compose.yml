# Coolify: external named volume — survives redeploys (hash volumes do not).
# On the Coolify server, run ONCE before first deploy:
#   docker volume create ilhamspace-db
# DELETE all "Persistent Storage" entries in Coolify UI (especially /app/data).
services:
  app:
    build:
      context: .
      args:
        - COOLIFY_URL=${COOLIFY_URL:-}
        - COOLIFY_FQDN=${COOLIFY_FQDN:-}
    expose:
      - 3000
    volumes:
      - ilhamspace-db:/data/db
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - ORIGIN=${ORIGIN:-https://is.cianjur.space}
      - DATABASE_PATH=/data/db/ilhamspace.db
      - SESSION_SECRET=${SESSION_SECRET:?Set SESSION_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - BODY_SIZE_LIMIT=${BODY_SIZE_LIMIT:-15M}
    labels:
      - "coolify.port=3000"
    networks:
      - coolify
    restart: always

networks:
  coolify:
    external: true

volumes:
  ilhamspace-db:
    name: ilhamspace-db
    external: true