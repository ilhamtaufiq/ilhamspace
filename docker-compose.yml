# DB di /persist — BUKAN /app/data (Coolify Persistent Storage menimpa /app/data dengan volume hash baru tiap deploy).
# Volume "ilhamspace-data" dibuat otomatis oleh Docker, tanpa SSH.
services:
  app:
    build:
      context: .
      args:
        - COOLIFY_URL=${COOLIFY_URL:-}
        - COOLIFY_FQDN=${COOLIFY_FQDN:-}
    expose:
      - 3000
    volumes:
      - ilhamspace-data:/persist
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - ORIGIN=${ORIGIN:-https://is.cianjur.space}
      - DATABASE_PATH=/persist/ilhamspace.db
      - SESSION_SECRET=${SESSION_SECRET:?Set SESSION_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - BODY_SIZE_LIMIT=${BODY_SIZE_LIMIT:-15M}
    labels:
      - "coolify.port=3000"
    networks:
      - coolify
    restart: always

networks:
  coolify:
    external: true

volumes:
  ilhamspace-data:
    name: ilhamspace-data